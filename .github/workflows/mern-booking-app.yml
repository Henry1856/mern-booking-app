name: mern-booking-hotel CI/CD

# Triggers — when to run this workflow
on:
  push:
    branches:
      - main          # runs when you push to main
      - develop       # runs when you push to develop
  pull_request:
    branches:
      - main          # runs when you open a PR to main
      - develop

jobs:
  # ── JOB 1: CI — Build and Type Check ──────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest  # runs on GitHub's Ubuntu server

    steps:
      # Step 1 — Checkout your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'        # Node version
          cache: 'npm'              # cache node_modules for faster runs

      # Step 3 — Install dependencies
      - name: Install dependencies
        run: npm ci                 # ci is faster and more reliable than npm install

      # Step 4 — Check TypeScript compiles without errors
      - name: TypeScript type check
        run: npx tsc --noEmit      # checks types without generating files

      # Step 5 — Build the project
      - name: Build
        run: npm run build          # compiles TypeScript to JavaScript
        env:
          NODE_ENV: production

  # ── JOB 2: CD — Deploy to Render ──────────────────────────────────────────
  # Only runs after build job succeeds AND only on push to main
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build                   # waits for build job to pass first
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      # Step 1 — Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Deploy to Render using deploy hook
      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          curl -X POST "$RENDER_DEPLOY_HOOK"
          echo "Deployment triggered successfully"
